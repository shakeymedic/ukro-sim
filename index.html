<!DOCTYPE html>
<html lang="en-GB" class="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>UKRO High-Fidelity Scenario Simulator</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        ukro: { blue: '#0033A0', red: '#C8102E', navy: '#001B44' }
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="scenarios.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #9ca3af; border-radius: 3px; }
        
        .btn { transition: all 0.1s; font-weight: 600; border-bottom-width: 3px; }
        .btn:active { transform: translateY(2px); border-bottom-width: 1px; margin-top: 2px; }
        .btn-primary { background-color: #0033A0; border-color: #001B44; color: white; }
        .btn-danger { background-color: #C8102E; border-color: #8f0d22; color: white; }
        
        .map-item { position: absolute; cursor: grab; user-select: none; touch-action: none; transform-origin: center center; }
        .map-item:active { cursor: grabbing; }

        @media print {
            body { background: white !important; color: black !important; }
            .no-print { display: none !important; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-900 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-200">

    <header class="bg-white dark:bg-gray-800 border-b-4 border-ukro-blue p-4 shadow-sm no-print sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://iili.io/KGQOvkl.md.png" alt="WMEBEM Logo" class="h-12 w-auto object-contain">
                <div>
                    <h1 class="text-xl font-bold leading-tight">UKRO Simulator <span class="text-blue-600 dark:text-blue-400 text-sm align-top">v5.0</span></h1>
                    <p class="text-xs text-gray-500 dark:text-gray-400 font-medium">Advanced Assessment Platform</p>
                </div>
            </div>
            <div class="flex gap-3 items-center">
                <button onclick="app.toggleDarkMode()" class="btn bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white border-gray-300 dark:border-gray-600 px-3 py-1 rounded">
                    <i class="fa-solid fa-moon"></i>
                </button>
                <button onclick="document.documentElement.requestFullscreen()" class="btn bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white border-gray-300 dark:border-gray-600 px-3 py-1 rounded" title="Fullscreen">
                    <i class="fa-solid fa-expand"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full max-w-7xl mx-auto p-4 md:p-6" id="app-root">
        <div class="flex justify-center items-center h-64">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-ukro-blue"></div>
        </div>
    </main>

    <script>
        const ACVPU = ['U', 'P', 'V', 'C', 'A'];

        const CoreData = {
            vehicles: {
                'Saloon': { width: 100, height: 50, color: '#3b82f6', isEV: false, hasUHSS: false },
                'Tesla Model 3': { width: 100, height: 50, color: '#10b981', isEV: true, hasUHSS: true },
                'HGV Cab': { width: 120, height: 80, color: '#ef4444', isEV: false, hasUHSS: true },
                'Single Decker Bus': { width: 250, height: 60, color: '#f59e0b', isEV: true, hasUHSS: false }
            },
            hazmat: [
                { type: 'UN 1203 Petrol', class: '3', danger: 'Highly Flammable', cordon: 50 },
                { type: 'UN 1005 Ammonia', class: '2.3', danger: 'Toxic Gas', cordon: 100 },
                { type: 'Lithium Battery Fire', class: '9', danger: 'Thermal Runaway', cordon: 25 }
            ],
            injuries: {
                'Uninjured': { type: 'none', vitals: { A: 'A', HR: 80, RR: 16, SBP: 120, SpO2: 99 }, det: {} },
                'Tension Pneumothorax': { type: 'major', vitals: { A: 'C', HR: 140, RR: 35, SBP: 80, SpO2: 85 }, det: { SpO2: -2, SBP: -3, HR: 3 } },
                'Catastrophic Haemorrhage': { type: 'major', vitals: { A: 'V', HR: 150, RR: 30, SBP: 75, SpO2: 90 }, det: { SBP: -4, HR: 3, A: -1 } },
                'Severe Head Injury': { type: 'major', vitals: { A: 'P', HR: 55, RR: 10, SBP: 180, SpO2: 92 }, det: { A: -1, RR: -1, SpO2: -2 } },
                'Pelvic Fracture': { type: 'major', vitals: { A: 'A', HR: 130, RR: 26, SBP: 90, SpO2: 95 }, det: { SBP: -3, HR: 3 } },
                'Femur Fracture': { type: 'major', vitals: { A: 'A', HR: 120, RR: 24, SBP: 100, SpO2: 97 }, det: { SBP: -2, HR: 2 } },
                'Simple Pneumothorax': { type: 'moderate', vitals: { A: 'A', HR: 110, RR: 28, SBP: 115, SpO2: 93 }, det: { SpO2: -1, RR: 1 } }
            },
            markingCriteria: [
                { id: 'm1', cat: 'Command', text: 'Inner/Outer cordons established', points: 5 },
                { id: 'm2', cat: 'Command', text: 'Effective multi-agency briefing', points: 5 },
                { id: 'm3', cat: 'Technical', text: 'Primary stabilisation complete', points: 10 },
                { id: 'm4', cat: 'Technical', text: 'Glass managed effectively', points: 5 },
                { id: 'm5', cat: 'Technical', text: 'Sharps protection applied', points: 5 },
                { id: 'm6', cat: 'Medical', text: 'C-Spine controlled immediately', points: 10 },
                { id: 'm7', cat: 'Medical', text: 'Catastrophic haemorrhage treated', points: 10 },
                { id: 'm8', cat: 'Medical', text: 'Structured ATMIST handover', points: 5 }
            ]
        };

        const Utils = {
            randInt: (min, max) => Math.floor(Math.random() * (max - min + 1) + min),
            choice: (arr) => arr[Math.floor(Math.random() * arr.length)],
            clamp: (v, lo, hi) => Math.max(lo, Math.min(hi, v))
        };

        class SimulatorApp {
            constructor() {
                this.state = {
                    view: 'menu',
                    darkMode: false,
                    simRunning: false,
                    simTime: 0,
                    logs: [],
                    score: 0,
                    criticalFails: 0,
                    scenario: null,
                    dragState: null
                };
                this.timerInterval = null;
                this.tickInterval = null;
                this.charts = {};
                this.init();
            }

            init() {
                if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    this.toggleDarkMode();
                }
                this.render();
            }

            toggleDarkMode() {
                this.state.darkMode = !this.state.darkMode;
                if (this.state.darkMode) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }

            loadPremadeScenario() {
                const selectElement = document.getElementById('premadeSelect');
                const selectedId = selectElement.value;
                if (!selectedId) return;

                const dbScenario = allAvailableScenarios.premade.find(s => s.id === selectedId);
                if (!dbScenario) return;

                this.buildScenarioData(dbScenario);
            }

            buildScenarioData(dbScenario) {
                const config = dbScenario.config;
                const vehicles = [];
                for (let i = 0; i < config.vCount; i++) {
                    const type = Utils.choice(Object.keys(CoreData.vehicles));
                    vehicles.push({
                        id: `v${i}`,
                        type: type,
                        ...CoreData.vehicles[type],
                        x: Utils.randInt(50, 700),
                        y: Utils.randInt(50, 200),
                        rot: Utils.randInt(0, 360)
                    });
                }

                const casualties = [];
                for (let i = 0; i < config.presetInjuries.length; i++) {
                    const injType = config.presetInjuries[i];
                    const injData = CoreData.injuries[injType] || CoreData.injuries['Uninjured'];
                    casualties.push({
                        id: i,
                        injury: injType,
                        vitals: { ...injData.vitals },
                        initialVitals: { ...injData.vitals },
                        det: { ...injData.det },
                        history: [],
                        x: Utils.randInt(100, 600),
                        y: Utils.randInt(100, 200),
                        isArrest: false
                    });
                }

                const hazmat = [];
                if (config.hasHazmat) {
                    const hazard = Utils.choice(CoreData.hazmat);
                    hazmat.push({
                        id: 'h1',
                        ...hazard,
                        x: Utils.randInt(200, 500),
                        y: Utils.randInt(50, 200)
                    });
                }

                this.state.scenario = {
                    title: dbScenario.title,
                    env: { weather: config.weather, time: config.timeOfDay },
                    vehicles,
                    casualties,
                    hazmat,
                    marks: CoreData.markingCriteria.map(m => ({ ...m, checked: false })),
                    equipment: config.equipment || { frs: ['Standard Setup'], medical: ['Standard Trauma Bag'] },
                    actorBrief: config.actorBrief || 'Follow instructor guidance.',
                    entrapment: config.entrapment || 'Standard'
                };

                this.state.view = 'pre-scenario';
                this.state.logs = [];
                this.state.simTime = 0;
                this.state.criticalFails = 0;
                this.render();
            }

            transitionToLive() {
                this.state.view = 'live';
                this.logEvent('System', `Scenario initialised. Weather: ${this.state.scenario.env.weather}.`);
                this.render();
                this.setupDragEvents();
            }

            startSim() {
                this.state.simRunning = true;
                this.logEvent('System', 'Simulation started.');
                this.timerInterval = setInterval(() => {
                    this.state.simTime++;
                    this.updateTimerDisplay();
                }, 1000);
                this.tickInterval = setInterval(() => this.processPhysiologyTick(), 5000);
                this.render();
            }

            pauseSim() {
                this.state.simRunning = false;
                clearInterval(this.timerInterval);
                clearInterval(this.tickInterval);
                this.logEvent('System', 'Simulation paused.');
                this.render();
            }

            endSim() {
                this.pauseSim();
                this.state.view = 'debrief';
                this.logEvent('System', 'Simulation ended.');
                this.render();
                setTimeout(() => this.drawCharts(), 100);
            }

            processPhysiologyTick() {
                const envMod = this.state.scenario.env.weather === 'Freezing' ? 1.5 : 1.0;
                
                this.state.scenario.casualties.forEach(c => {
                    if (c.isArrest) {
                        c.vitals = { A: 'U', HR: 0, RR: 0, SBP: 0, SpO2: 0 };
                        c.history.push({ t: this.state.simTime, ...c.vitals });
                        return;
                    }

                    if (Math.random() < 0.2) {
                        Object.keys(c.det).forEach(key => {
                            const change = c.det[key] * envMod;
                            if (key === 'A') {
                                let idx = ACVPU.indexOf(c.vitals.A);
                                idx = Utils.clamp(idx - Math.sign(change), 0, 4);
                                c.vitals.A = ACVPU[idx];
                            } else {
                                c.vitals[key] = Math.max(0, Math.round(c.vitals[key] + change));
                            }
                        });
                    }

                    if (c.vitals.SBP < 50) {
                        c.isArrest = true;
                        this.logEvent(`Casualty ${c.id + 1}`, 'CARDIAC ARREST secondary to hypovolaemia.', 'danger');
                    }

                    c.history.push({ t: this.state.simTime, ...c.vitals });
                });
                this.updateVitalsDisplay();
            }

            logEvent(source, message, type = 'normal') {
                const timeStr = `${Math.floor(this.state.simTime / 60).toString().padStart(2, '0')}:${(this.state.simTime % 60).toString().padStart(2, '0')}`;
                this.state.logs.unshift({ time: timeStr, source, message, type });
                this.updateLogDisplay();
            }

            triggerCriticalFail(reason) {
                this.state.criticalFails++;
                this.logEvent('ASSESSOR', `CRITICAL FAILURE: ${reason}`, 'danger');
                document.getElementById('crit-fail-count').innerText = this.state.criticalFails;
            }

            toggleMark(id) {
                const mark = this.state.scenario.marks.find(m => m.id === id);
                if (mark) {
                    mark.checked = !mark.checked;
                    this.logEvent('ASSESSOR', `${mark.text} marked as ${mark.checked ? 'Complete' : 'Incomplete'}.`);
                }
            }

            applyTreatment(casId, treatment) {
                const c = this.state.scenario.casualties.find(x => x.id === casId);
                if (!c) return;
                
                if (treatment === 'Tourniquet') { c.vitals.SBP += 20; c.vitals.HR -= 15; c.det.SBP = 0; }
                if (treatment === 'Oxygen') { c.vitals.SpO2 = Utils.clamp(c.vitals.SpO2 + 10, 0, 100); c.det.SpO2 = 0; }
                if (treatment === 'Pelvic Binder') { c.vitals.SBP += 10; c.det.SBP = 0; }
                if (treatment === 'Decompress') { c.vitals.SpO2 += 15; c.vitals.SBP += 15; c.vitals.RR = 20; c.det.SpO2 = 0; c.det.SBP = 0; }

                this.logEvent(`Casualty ${casId + 1}`, `${treatment} applied.`, 'success');
                this.updateVitalsDisplay();
            }

            setupDragEvents() {
                const mapArea = document.getElementById('scene-map');
                if (!mapArea) return;

                mapArea.addEventListener('mousedown', this.startDrag.bind(this), { passive: false });
                mapArea.addEventListener('mousemove', this.doDrag.bind(this), { passive: false });
                window.addEventListener('mouseup', this.endDrag.bind(this));

                mapArea.addEventListener('touchstart', this.startDrag.bind(this), { passive: false });
                mapArea.addEventListener('touchmove', this.doDrag.bind(this), { passive: false });
                window.addEventListener('touchend', this.endDrag.bind(this));
            }

            getEventPos(e) {
                if (e.touches && e.touches.length > 0) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
                return { x: e.clientX, y: e.clientY };
            }

            startDrag(e) {
                const target = e.target.closest('.map-item');
                if (!target) return;
                e.preventDefault();
                const pos = this.getEventPos(e);
                const rect = target.getBoundingClientRect();
                const mapRect = document.getElementById('scene-map').getBoundingClientRect();
                
                this.state.dragState = {
                    element: target,
                    type: target.dataset.type,
                    id: target.dataset.id,
                    offsetX: pos.x - rect.left,
                    offsetY: pos.y - rect.top,
                    mapRect: mapRect
                };
            }

            doDrag(e) {
                if (!this.state.dragState) return;
                e.preventDefault();
                const pos = this.getEventPos(e);
                const ds = this.state.dragState;
                
                let newX = pos.x - ds.mapRect.left - ds.offsetX;
                let newY = pos.y - ds.mapRect.top - ds.offsetY;
                
                newX = Utils.clamp(newX, 0, ds.mapRect.width - ds.element.offsetWidth);
                newY = Utils.clamp(newY, 0, ds.mapRect.height - ds.element.offsetHeight);
                
                ds.element.style.left = `${newX}px`;
                ds.element.style.top = `${newY}px`;
            }

            endDrag(e) {
                if (!this.state.dragState) return;
                const ds = this.state.dragState;
                
                const left = parseFloat(ds.element.style.left);
                const top = parseFloat(ds.element.style.top);

                if (ds.type === 'vehicle') {
                    const v = this.state.scenario.vehicles.find(x => x.id === ds.id);
                    if(v) { v.x = left; v.y = top; }
                } else if (ds.type === 'casualty') {
                    const c = this.state.scenario.casualties.find(x => x.id == ds.id);
                    if(c) { c.x = left; c.y = top; }
                } else if (ds.type === 'hazmat') {
                    const h = this.state.scenario.hazmat.find(x => x.id === ds.id);
                    if(h) { h.x = left; h.y = top; }
                }
                
                this.state.dragState = null;
            }

            rotateItem(type, id) {
                if (type === 'vehicle') {
                    const v = this.state.scenario.vehicles.find(x => x.id === id);
                    if (v) {
                        v.rot = (v.rot + 45) % 360;
                        const el = document.querySelector(`.map-item[data-id="${id}"]`);
                        if (el) el.style.transform = `rotate(${v.rot}deg)`;
                    }
                }
            }

            render() {
                const root = document.getElementById('app-root');
                if (this.state.view === 'menu') {
                    root.innerHTML = this.templateMenu();
                } else if (this.state.view === 'pre-scenario') {
                    root.innerHTML = this.templatePreScenario();
                } else if (this.state.view === 'live') {
                    root.innerHTML = this.templateLive();
                    this.updateVitalsDisplay();
                    this.updateLogDisplay();
                } else if (this.state.view === 'debrief') {
                    root.innerHTML = this.templateDebrief();
                }
            }

            templateMenu() {
                let options = allAvailableScenarios.premade.map(s => `<option value="${s.id}">${s.title}</option>`).join('');

                return `
                <div class="max-w-3xl mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8">
                    <h2 class="text-3xl font-bold mb-6 border-b pb-4 dark:border-gray-700">Select Premade Scenario</h2>
                    <div class="space-y-6">
                        <div>
                            <label class="block font-bold mb-2 text-sm text-gray-600 dark:text-gray-300">Scenario Database (120 Available)</label>
                            <select id="premadeSelect" class="w-full border rounded p-3 bg-gray-50 dark:bg-gray-700 dark:border-gray-600 text-lg">
                                <option value="" disabled selected>Select a medical baseline...</option>
                                ${options}
                            </select>
                        </div>
                        <button onclick="app.loadPremadeScenario()" class="btn btn-primary w-full py-4 text-lg rounded shadow-md">Load Scenario Brief</button>
                    </div>
                </div>`;
            }

            templatePreScenario() {
                const s = this.state.scenario;
                
                let frsItems = s.equipment.frs.map(item => `<li><i class="fa-solid fa-check text-green-500 mr-2"></i>${item}</li>`).join('');
                let medicalItems = s.equipment.medical.map(item => `<li><i class="fa-solid fa-check text-blue-500 mr-2"></i>${item}</li>`).join('');

                return `
                <div class="max-w-5xl mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8 space-y-8 animate-fade-in print:shadow-none print:p-0">
                    <div class="flex justify-between items-end border-b-4 border-ukro-blue pb-4">
                        <div>
                            <h2 class="text-3xl font-bold">${s.title}</h2>
                            <p class="text-gray-500">Instructor Setup Briefing</p>
                        </div>
                        <div class="no-print space-x-2">
                            <button onclick="window.print()" class="btn bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white px-4 py-2 rounded shadow">Print Brief</button>
                            <button onclick="app.transitionToLive()" class="btn btn-primary px-6 py-2 rounded shadow text-lg">Start Simulation</button>
                        </div>
                    </div>

                    <div class="bg-gray-50 dark:bg-gray-900 p-4 rounded border dark:border-gray-700">
                        <h3 class="text-xl font-bold mb-4 text-gray-800 dark:text-gray-200"><i class="fa-solid fa-map text-ukro-blue mr-2"></i>Target Scene Layout (Logistics)</h3>
                        <div class="relative w-full bg-gray-200 dark:bg-gray-700 overflow-hidden rounded border border-gray-300 dark:border-gray-600" style="height: 300px;">
                            ${this.renderMapItems(true)}
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-gray-50 dark:bg-gray-900 p-4 rounded border dark:border-gray-700">
                            <h3 class="text-xl font-bold mb-4 text-gray-800 dark:text-gray-200"><i class="fa-solid fa-fire-extinguisher text-red-500 mr-2"></i>FRS Equipment Manifest</h3>
                            <ul class="space-y-2 text-sm">
                                ${frsItems}
                            </ul>
                            <div class="mt-4 pt-4 border-t dark:border-gray-700">
                                <p class="text-sm font-bold text-gray-600 dark:text-gray-400">Expected Entrapment:</p>
                                <p class="text-sm">${s.entrapment}</p>
                            </div>
                        </div>

                        <div class="bg-gray-50 dark:bg-gray-900 p-4 rounded border dark:border-gray-700">
                            <h3 class="text-xl font-bold mb-4 text-gray-800 dark:text-gray-200"><i class="fa-solid fa-suitcase-medical text-blue-500 mr-2"></i>Medical Equipment Manifest</h3>
                            <ul class="space-y-2 text-sm">
                                ${medicalItems}
                            </ul>
                        </div>
                    </div>

                    <div class="bg-yellow-50 dark:bg-yellow-900/20 border border-yellow-200 dark:border-yellow-800 p-6 rounded">
                        <h3 class="text-xl font-bold mb-2 text-yellow-800 dark:text-yellow-500"><i class="fa-solid fa-user-injured mr-2"></i>Casualty Actor Instructions</h3>
                        <p class="text-gray-800 dark:text-gray-200 text-lg italic">"${s.actorBrief}"</p>
                    </div>
                </div>`;
            }

            templateLive() {
                const s = this.state.scenario;
                return `
                <div class="flex flex-col h-[calc(100vh-100px)] gap-4">
                    <div class="bg-white dark:bg-gray-800 p-4 rounded shadow flex justify-between items-center border border-gray-200 dark:border-gray-700">
                        <div class="flex gap-4 items-center">
                            <div class="bg-gray-900 text-red-500 font-mono text-3xl px-4 py-1 rounded font-bold" id="main-timer">00:00</div>
                            <div class="text-sm">
                                <span class="block text-gray-500 dark:text-gray-400 font-bold uppercase">Environment</span>
                                <span>${s.env.weather} | ${s.env.time}</span>
                            </div>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="app.triggerCriticalFail('Unsafe Action')" class="btn btn-danger px-4 py-2 rounded flex items-center gap-2">
                                <i class="fa-solid fa-triangle-exclamation"></i> Critical Fail (<span id="crit-fail-count">${this.state.criticalFails}</span>)
                            </button>
                            ${this.state.simRunning 
                                ? `<button onclick="app.pauseSim()" class="btn bg-yellow-500 text-white px-4 py-2 rounded">Pause</button>`
                                : `<button onclick="app.startSim()" class="btn bg-green-600 text-white px-4 py-2 rounded">Start</button>`
                            }
                            <button onclick="app.endSim()" class="btn bg-gray-800 text-white px-4 py-2 rounded">End Exercise</button>
                        </div>
                    </div>

                    <div class="flex-grow grid grid-cols-1 lg:grid-cols-4 gap-4 overflow-hidden">
                        <div class="lg:col-span-2 bg-white dark:bg-gray-800 rounded shadow border border-gray-200 dark:border-gray-700 flex flex-col">
                            <div class="p-2 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-900 font-bold text-sm text-gray-600 dark:text-gray-400 flex justify-between">
                                <span>Scene Map (Drag to position)</span>
                            </div>
                            <div id="scene-map" class="relative flex-grow bg-gray-200 dark:bg-gray-700 overflow-hidden" style="min-height: 400px;">
                                ${this.renderMapItems(false)}
                            </div>
                        </div>

                        <div class="flex flex-col gap-4 overflow-y-auto custom-scroll">
                            <div class="bg-white dark:bg-gray-800 p-3 rounded shadow border border-gray-200 dark:border-gray-700">
                                <h3 class="font-bold border-b pb-1 mb-2 dark:border-gray-700 text-sm uppercase">Casualties</h3>
                                <div id="vitals-container" class="space-y-3"></div>
                            </div>
                        </div>

                        <div class="flex flex-col gap-4 overflow-hidden">
                            <div class="bg-white dark:bg-gray-800 rounded shadow border border-gray-200 dark:border-gray-700 flex-grow flex flex-col">
                                <h3 class="font-bold p-3 border-b dark:border-gray-700 text-sm uppercase bg-gray-50 dark:bg-gray-900">Grading Sheet</h3>
                                <div class="p-3 space-y-2 overflow-y-auto custom-scroll flex-grow">
                                    ${s.marks.map(m => `
                                        <label class="flex items-start gap-2 text-sm cursor-pointer p-2 hover:bg-gray-50 dark:hover:bg-gray-700 rounded border dark:border-gray-600">
                                            <input type="checkbox" class="mt-1" onchange="app.toggleMark('${m.id}')" ${m.checked ? 'checked' : ''}>
                                            <span><span class="font-bold text-gray-500 dark:text-gray-400 block text-xs">${m.cat}</span>${m.text}</span>
                                        </label>
                                    `).join('')}
                                </div>
                            </div>
                            <div class="bg-white dark:bg-gray-800 rounded shadow border border-gray-200 dark:border-gray-700 h-64 flex flex-col">
                                <h3 class="font-bold p-3 border-b dark:border-gray-700 text-sm uppercase bg-gray-50 dark:bg-gray-900">Live Log</h3>
                                <div id="log-view" class="p-2 flex-grow overflow-y-auto custom-scroll font-mono text-xs space-y-1"></div>
                            </div>
                        </div>
                    </div>
                </div>`;
            }

            renderMapItems(isStatic = false) {
                const s = this.state.scenario;
                let html = '';
                
                const pointerEvents = isStatic ? 'pointer-events: none;' : '';
                const clickHandler = isStatic ? '' : `ondblclick="app.rotateItem('vehicle', '${v.id}')"`;

                s.vehicles.forEach(v => {
                    html += `<div class="map-item border-2 border-white shadow-md flex items-center justify-center text-white font-bold text-xs rounded" 
                                  data-type="vehicle" data-id="${v.id}" 
                                  style="left: ${v.x}px; top: ${v.y}px; width: ${v.width}px; height: ${v.height}px; background-color: ${v.color}; transform: rotate(${v.rot}deg); ${pointerEvents}"
                                  ${isStatic ? '' : `ondblclick="app.rotateItem('vehicle', '${v.id}')"`}>
                                  ${v.type}<br>${v.isEV ? '(EV)' : ''}
                             </div>`;
                });

                s.hazmat.forEach(h => {
                    html += `<div class="map-item border-2 border-red-500 bg-yellow-400 text-red-900 font-bold text-xs p-2 rounded shadow-lg text-center"
                                  data-type="hazmat" data-id="${h.id}"
                                  style="left: ${h.x}px; top: ${h.y}px; ${pointerEvents}">
                                  <i class="fa-solid fa-biohazard text-lg block"></i>${h.type}
                             </div>`;
                });

                s.casualties.forEach(c => {
                    html += `<div class="map-item bg-red-600 text-white rounded-full w-8 h-8 flex items-center justify-center font-bold text-xs shadow-lg border-2 border-white"
                                  data-type="casualty" data-id="${c.id}"
                                  style="left: ${c.x}px; top: ${c.y}px; ${pointerEvents}">C${c.id+1}</div>`;
                });

                return html;
            }

            updateTimerDisplay() {
                const el = document.getElementById('main-timer');
                if (el) el.innerText = `${Math.floor(this.state.simTime / 60).toString().padStart(2, '0')}:${(this.state.simTime % 60).toString().padStart(2, '0')}`;
            }

            updateLogDisplay() {
                const el = document.getElementById('log-view');
                if (!el) return;
                el.innerHTML = this.state.logs.map(l => {
                    const colour = l.type === 'danger' ? 'text-red-600 dark:text-red-400' : l.type === 'success' ? 'text-green-600 dark:text-green-400' : 'text-gray-600 dark:text-gray-400';
                    return `<div class="${colour} border-b dark:border-gray-700 pb-1"><span class="text-gray-400">[${l.time}]</span> <strong>${l.source}:</strong> ${l.message}</div>`;
                }).join('');
            }

            updateVitalsDisplay() {
                const container = document.getElementById('vitals-container');
                if (!container) return;
                
                container.innerHTML = this.state.scenario.casualties.map(c => {
                    const v = c.vitals;
                    return `
                    <div class="border dark:border-gray-600 rounded p-3 bg-gray-50 dark:bg-gray-700">
                        <div class="flex justify-between items-center mb-2 border-b dark:border-gray-600 pb-1">
                            <h4 class="font-bold text-red-600 dark:text-red-400">Casualty ${c.id + 1}</h4>
                            <span class="text-xs bg-red-100 text-red-800 px-2 py-0.5 rounded uppercase font-bold">${c.injury}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-sm font-mono bg-gray-900 text-green-400 p-2 rounded mb-2">
                            <div><span class="text-gray-500 text-xs block">ACVPU</span>${v.A}</div>
                            <div><span class="text-gray-500 text-xs block">HR</span>${v.HR}</div>
                            <div><span class="text-gray-500 text-xs block">RR</span>${v.RR}</div>
                            <div><span class="text-gray-500 text-xs block">BP</span>${v.SBP}/${Math.round(v.SBP * 0.6)}</div>
                            <div><span class="text-gray-500 text-xs block">SpO2</span>${v.SpO2}%</div>
                        </div>
                        <div class="flex flex-wrap gap-1">
                            <button onclick="app.applyTreatment(${c.id}, 'Oxygen')" class="btn bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded border border-blue-300 hover:bg-blue-200">O2 Therapy</button>
                            <button onclick="app.applyTreatment(${c.id}, 'Tourniquet')" class="btn bg-red-100 text-red-800 text-xs px-2 py-1 rounded border border-red-300 hover:bg-red-200">Tourniquet</button>
                            <button onclick="app.applyTreatment(${c.id}, 'Pelvic Binder')" class="btn bg-yellow-100 text-yellow-800 text-xs px-2 py-1 rounded border border-yellow-300 hover:bg-yellow-200">Pelvic Binder</button>
                            <button onclick="app.applyTreatment(${c.id}, 'Decompress')" class="btn bg-purple-100 text-purple-800 text-xs px-2 py-1 rounded border border-purple-300 hover:bg-purple-200">Needle Decomp</button>
                        </div>
                    </div>`;
                }).join('');
            }

            templateDebrief() {
                const s = this.state.scenario;
                const totalMarks = s.marks.filter(m => m.checked).reduce((sum, m) => sum + m.points, 0);
                const maxMarks = s.marks.reduce((sum, m) => sum + m.points, 0);
                
                return `
                <div id="debrief-doc" class="max-w-5xl mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-lg p-8 space-y-8 print:shadow-none print:p-0">
                    <div class="flex justify-between items-end border-b-4 border-ukro-blue pb-4">
                        <div>
                            <h2 class="text-3xl font-bold uppercase">Official Debrief Record</h2>
                            <p class="text-gray-500">Duration: ${Math.floor(this.state.simTime / 60)}m ${this.state.simTime % 60}s</p>
                        </div>
                        <div class="no-print space-x-2">
                            <button onclick="window.print()" class="btn btn-primary px-4 py-2 rounded">Print / PDF</button>
                            <button onclick="app.state.view='menu'; app.render()" class="btn bg-gray-600 text-white px-4 py-2 rounded">New Scenario</button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div>
                            <h3 class="text-xl font-bold bg-gray-100 dark:bg-gray-700 p-2 rounded mb-4">Assessor Scoring</h3>
                            <div class="text-4xl font-bold text-ukro-blue mb-4">${totalMarks} / ${maxMarks} <span class="text-lg text-gray-500 font-normal">pts</span></div>
                            <ul class="space-y-2">
                                ${s.marks.map(m => `
                                    <li class="flex justify-between border-b dark:border-gray-700 pb-1">
                                        <span>${m.text}</span>
                                        <span class="font-bold ${m.checked ? 'text-green-600' : 'text-red-600'}">${m.checked ? 'Achieved' : 'Missed'}</span>
                                    </li>
                                `).join('')}
                            </ul>
                            <div class="mt-4 p-4 bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 rounded">
                                <h4 class="font-bold text-red-800 dark:text-red-400">Critical Failures</h4>
                                <p class="text-2xl font-bold text-red-600">${this.state.criticalFails}</p>
                            </div>
                        </div>
                        <div>
                            <h3 class="text-xl font-bold bg-gray-100 dark:bg-gray-700 p-2 rounded mb-4">Event Log</h3>
                            <div class="h-64 overflow-y-auto font-mono text-sm border dark:border-gray-700 p-2 rounded bg-gray-50 dark:bg-gray-900">
                                ${this.state.logs.map(l => `<div class="mb-1"><span class="text-gray-400">[${l.time}]</span> ${l.message}</div>`).join('')}
                            </div>
                        </div>
                    </div>

                    <div>
                        <h3 class="text-xl font-bold bg-gray-100 dark:bg-gray-700 p-2 rounded mb-4">Physiological Timelines</h3>
                        <div class="grid grid-cols-1 gap-6">
                            ${s.casualties.map(c => `
                                <div class="border dark:border-gray-700 rounded p-4">
                                    <h4 class="font-bold text-red-600 mb-2">Casualty ${c.id + 1} (${c.injury})</h4>
                                    <div class="h-48 w-full"><canvas id="chart-${c.id}"></canvas></div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                </div>`;
            }

            drawCharts() {
                const s = this.state.scenario;
                if (!s || !s.casualties) return;

                const gridColor = this.state.darkMode ? '#374151' : '#e5e7eb';
                const textColor = this.state.darkMode ? '#9ca3af' : '#4b5563';

                s.casualties.forEach(c => {
                    const ctx = document.getElementById(`chart-${c.id}`);
                    if (!ctx) return;
                    
                    const labels = c.history.map(d => `${Math.floor(d.t/60)}:${String(d.t%60).padStart(2,'0')}`);
                    
                    if (this.charts[c.id]) this.charts[c.id].destroy();

                    this.charts[c.id] = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [
                                { label: 'HR', data: c.history.map(d => d.HR), borderColor: '#ef4444', tension: 0.3, pointRadius: 1 },
                                { label: 'SBP', data: c.history.map(d => d.SBP), borderColor: '#3b82f6', tension: 0.3, pointRadius: 1 },
                                { label: 'SpO2', data: c.history.map(d => d.SpO2), borderColor: '#10b981', tension: 0.3, pointRadius: 1 }
                            ]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            scales: {
                                x: { grid: { color: gridColor }, ticks: { color: textColor } },
                                y: { grid: { color: gridColor }, ticks: { color: textColor } }
                            },
                            plugins: {
                                legend: { labels: { color: textColor } }
                            }
                        }
                    });
                });
            }
        }

        const app = new SimulatorApp();
    </script>
</body>
</html>
